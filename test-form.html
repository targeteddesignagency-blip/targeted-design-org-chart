<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Targeted Design - Lead Capture Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
        h1 { color: #2563eb; margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb; }
        button { width: 100%; padding: 16px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 600; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .success { background: #10b981; color: white; padding: 20px; border-radius: 8px; text-align: center; margin-top: 20px; }
        .error { background: #ef4444; color: white; padding: 20px; border-radius: 8px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦾 Targeted Design</h1>
        <p>AI-Powered EDDM Marketing</p>
        
        <form id="leadForm">
            <div class="form-group">
                <label>Name *</label>
                <input type="text" id="name" required placeholder="John Smith">
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required placeholder="john@business.com">
            </div>
            
            <div class="form-group">
                <label>Phone *</label>
                <input type="tel" id="phone" required placeholder="(210) 555-1234">
            </div>
            
            <div class="form-group">
                <label>Business *</label>
                <input type="text" id="business" required placeholder="ABC Company">
            </div>
            
            <div class="form-group">
                <label>Industry *</label>
                <select id="industry" required>
                    <option value="">Select Industry</option>
                    <option value="hvac">HVAC</option>
                    <option value="roofing">Roofing</option>
                    <option value="auto">Auto Repair</option>
                    <option value="restaurant">Restaurant</option>
                    <option value="dental">Dental</option>
                    <option value="fitness">Fitness</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Package *</label>
                <select id="package" required>
                    <option value="">Select Package</option>
                    <option value="starter">Starter - $150/mo</option>
                    <option value="standard">Standard - $550/mo</option>
                    <option value="premium">Premium - $1,000/mo</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Message</label>
                <textarea id="message" rows="3" placeholder="Tell us about your business..."></textarea>
            </div>
            
            <button type="submit" id="submitBtn">Submit →</button>
        </form>
        
        <div id="result"></div>
    </div>
    
    <script>
        const API_URL = 'https://td-lead-capture.targeted-design-agency.workers.dev/api/lead';
        
        document.getElementById('leadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                business: document.getElementById('business').value,
                industry: document.getElementById('industry').value,
                package: document.getElementById('package').value,
                message: document.getElementById('message').value
            };
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('leadForm').innerHTML = `
                        <div class="success">
                            <h2>✅ Success!</h2>
                            <p style="color: white; margin-top: 10px;">Lead ID: ${result.leadId}</p>
                            <p style="color: white; margin-top: 10px;">We'll contact you within 24 hours.</p>
                        </div>
                    `;
                } else {
                    throw new Error(result.error || 'Submission failed');
                }
            } catch (error) {
                document.getElementById('leadForm').innerHTML = `
                    <div class="error">
                        <h2>⚠️ Error</h2>
                        <p style="color: white; margin-top: 10px;">${error.message}</p>
                        <p style="color: white; margin-top: 10px;">Please email: info@targeted-design.com</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
